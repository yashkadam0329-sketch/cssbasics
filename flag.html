<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    html{
      padding:0px;
      margin: 0px;
    }
    .flag{
      background-color: red;
      height:600px;
      width:900px;
      text-align: center;
      position: relative;
      border: 1px solid black;
    
    }
    .flag div p{
      height: 200px;
      width: 200px;
      background-color: white;
      border-radius: 50%;
      position:relative;
      left: 350px;
      top: 50px;
      border: 1px solid black;
    }
    .flag>div{
      background-color: #002868;
      height: 300px;
      width: 100%;
      position: absolute;
      top:25%;
      border: 1px solid black;
    }
    p{
      font-size: 80px;
      margin:0px;
      padding: 0px;
    }
  </style>
</head>
<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>Of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
