<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    /* Write your code here */
    html{
      background-color: blueviolet;
    }
    .red-circle{
      height: 200px;
      width: 200px;
      background-color: red;
      border-radius: 50%;
      position: absolute;
      top: 150px;
      left: 250px;
      text-align: center;
      font-size: xx-large;
      font-weight: 400;
      border: 10px solid gold;

    }
    .blue-box{
      background-color: blue;
      height: 300px;
      width: 500px;
      position: relative;
      left: 200px;
      top:200px;
      border:5px solid ;

    }
    h2{
      text-align: center;
      color:rgb(220, 244, 4);
      font-size:50px;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      text-decoration:dotted;
    }
    h1{
      text-anchor: middle;
      fill: #333;
    }
  </style>
</head>

<body>
  <div class="blue-box"><h2>MAXIMUM EFFORTS</h2>
    <div class="red-circle"><h1>-YASH</h1>
    </div>
  </div>

</body>

</html>
